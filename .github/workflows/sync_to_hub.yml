name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "sync-bot@example.com"
          git config --global user.name "Sync Bot"
          # Create a temporary directory and copy files
          mkdir temp_sync
          cp -r . temp_sync/
          cd temp_sync
          rm -rf .git
          git init
          git add .
          git commit -m "Syncing current state"
          git push --force https://Pardha05:$HF_TOKEN@huggingface.co/spaces/Pardha05/trading-analizer main
